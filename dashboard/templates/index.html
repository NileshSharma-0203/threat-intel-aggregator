<!DOCTYPE html>
<html>
<head>
    <title>Dark Web Leak Dashboard</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f2f2f2; }
        h1 { color: #222; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #888; padding: 8px; text-align: left; }
        th { background: #333; color: white; }
        input[type=text] { padding: 8px; width: 300px; }
        button { padding: 8px 16px; }
    </style>
</head>
<body>
    <h1>🔍 Dark Web Leak Dashboard</h1>
    <form method="GET">
        <input type="text" name="search" value="{{ search }}" placeholder="Search leaks...">
        <button type="submit">Search</button>
        <a href="/download"><button type="button">⬇️ Download CSV</button></a>
    </form>
    <table>
        <tr>
            <th>ID</th>
            <th>URL</th>
            <th>Leak Type</th>
            <th>Snippet</th>
            <th>Timestamp</th>
        </tr>
        {% for row in leaks %}
        <tr>
            <td>{{ row[0] }}</td>
            <td style="word-break: break-all;">{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td style="word-break: break-word;">{{ row[3][:200] }}...</td>
            <td>{{ row[4] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
